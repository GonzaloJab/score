<!DOCTYPE html>
<html>
<head>
  <title>Toon Scoreboard</title>
  <style>
    body { background: #f0f9ff; font-family: 'Arial Rounded MT Bold', sans-serif; text-align: center; }
    .scoreboard { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
    .team-card { width: 200px; padding: 20px; border-radius: 20px; color: white; border: 5px solid white; box-shadow: 0 10px 0 #ccc; }
    .mickelodeon { background: #ff6600; }
    .disney { background: #0066cc; }
    .boing { background: #e60000; }
    .score { font-size: 5rem; font-weight: bold; }
    .controls { margin-top: 15px; display: none; } /* Oculto por defecto */
    button { cursor: pointer; padding: 10px; border-radius: 10px; border: none; font-weight: bold; }
  </style>
</head>
<body>

  <h1>🏆 MARCADOR OFICIAL 🏆</h1>
  <div class="scoreboard">
    <div class="team-card mickelodeon">
      <h2>Mickelodeon</h2>
      <div id="mickelodeon" class="score">0</div>
      <div class="controls"><button onclick="updateScore('mickelodeon', 1)">+1 PUNTO</button></div>
    </div>
    <div class="team-card disney">
      <h2>Disney</h2>
      <div id="disney" class="score">0</div>
      <div class="controls"><button onclick="updateScore('disney', 1)">+1 PUNTO</button></div>
    </div>
    <div class="team-card boing">
      <h2>Boing</h2>
      <div id="boing" class="score">0</div>
      <div class="controls"><button onclick="updateScore('boing', 1)">+1 PUNTO</button></div>
    </div>
  </div>

  <script>
    const BIN_ID = 'TU_BIN_ID_AQUI';
    const API_KEY = 'TU_API_KEY_AQUI';
    const SECRET_PASS = 'laminar2026'; // Tu clave para editar

    // 1. Detectar si eres Admin
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === SECRET_PASS) {
      document.querySelectorAll('.controls').forEach(el => el.style.display = 'block');
    }

    // 2. Leer puntos de la nube
    async function loadScores() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': API_KEY }
      });
      const data = await res.json();
      document.getElementById('mickelodeon').innerText = data.record.mickelodeon;
      document.getElementById('disney').innerText = data.record.disney;
      document.getElementById('boing').innerText = data.record.boing;
    }

    // 3. Actualizar puntos
    async function updateScore(team, points) {
      const currentMick = parseInt(document.getElementById('mickelodeon').innerText);
      const currentDis = parseInt(document.getElementById('disney').innerText);
      const currentBoing = parseInt(document.getElementById('boing').innerText);

      const newData = {
        mickelodeon: team === 'mickelodeon' ? currentMick + points : currentMick,
        disney: team === 'disney' ? currentDis + points : currentDis,
        boing: team === 'boing' ? currentBoing + points : currentBoing
      };

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify(newData)
      });
      loadScores();
    }

    setInterval(loadScores, 5000); // Auto-actualizar cada 5 seg para tus amigos
    loadScores();
  </script>
</body>
</html>
