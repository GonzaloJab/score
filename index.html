<!DOCTYPE html>
<html>
<head>
  <title>Semana Grande CMP</title>
  <style>
    :root {
      --nickelodeon-color: #fab77d;
      --disney-color: #8492a0;
      --boing-color: #76cdfc;
      --nickelodeon: #fab77d;
      --disney: #8492a0;
      --boing: #76cdfc;
    } 

    body {
      background: #80ced6;
      background-image: radial-gradient(#ffffff 15%, transparent 16%), radial-gradient(#ffffff 15%, transparent 16%);
      background-size: 60px 60px;
      background-position: 0 0, 30px 30px;
      font-family: 'Arial Rounded MT Bold', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding-bottom: 50px;
    }

    h1 {
      font-size: 4rem;
      color: #fff;
      text-shadow: 6px 6px 0px #333;
      margin: 40px 0;
      text-transform: uppercase;
      transform: skewY(-2deg);
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin-bottom: 30px;
    }

    .team-card {
      width: 240px;
      padding: 25px 10px;
      border-radius: 40px;
      color: white;
      border: 6px solid #333;
      box-shadow: 12px 12px 0px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo-container {
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      margin: 0 10px 15px 10px;
      padding: 10px;
    }

    .logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.2));
    }

    .team-card.nickelodeon { background: var(--nickelodeon-color); transform: rotate(-1.5deg); }
    .team-card.disney { background: var(--disney-color); transform: rotate(1deg); }
    .team-card.boing { background: var(--boing-color); transform: rotate(-1deg); }

    .score {
      font-size: 6rem;
      font-weight: 900;
      text-shadow: 6px 6px 0px rgba(0,0,0,0.3);
      margin: 10px 0;
    }

    /* Tabla: se adapta al contenido, sin espacio vacío a la derecha */
    .scores-table-wrapper { width: fit-content; max-width: 95%; margin: 0 20px; box-sizing: border-box; }
    table {
      background: white;
      border-collapse: collapse;
      border: 4px solid #333;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
      width: max-content;
      table-layout: auto;
    }
    th, td { padding: 10px 12px; text-align: center; font-weight: bold; box-sizing: border-box; }
    th { background: #333; color: white; font-size: 0.9rem; }
    /* Mínimos para que no se solape EQUIPO y se lean bien los números */
    table col.equipo-col { min-width: 85px; }
    table col.day-col { min-width: 42px; }
    table col.total-col { min-width: 52px; }
    table td:first-child,
    table th:first-child { white-space: nowrap; }

    .team-header { font-size: 1.1rem; text-transform: uppercase; }
    .row-nickelodeon { background: var(--nickelodeon); color: #333; }
    .row-disney { background: var(--disney); color: #333; }
    .row-boing { background: var(--boing); color: white; }

    .total-cell { font-size: 1.4rem; background: #fff !important; color: #333; border-left: 4px solid #333; }
    thead th { font-size: 0.7rem; }
    thead tr:first-child th { font-size: 0.85rem; }

    table td { border: 1px solid #ddd; }
    table thead th { border: 1px solid rgba(255,255,255,0.3); }

    /* Panel Admin */
    .admin-panel { display: none; background: white; padding: 20px; border-radius: 20px; border: 4px solid #333; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; justify-content: center; }
    select, button { padding: 10px; border-radius: 8px; border: 2px solid #333; font-weight: bold; cursor: pointer; }
    .btn-plus { background: #2ecc71; color: white; }
    .btn-minus { background: #e74c3c; color: white; }
  </style>
</head>
<body>

  <h1> Puntuaciones Semana Grande </h1>

  <div class="scoreboard">
    <div class="team-card nickelodeon">
      <div class="logo-container">
        <img src="nickelodeon.png" alt="Nickelodeon">
      </div>
      <div id="score-nickelodeon" class="score">0</div>
    </div>
    <div class="team-card disney">
      <div class="logo-container">
        <img src="disney.png" alt="Disney">
      </div>
      <div id="score-disney" class="score">0</div>
    </div>
    <div class="team-card boing">
      <div class="logo-container">
        <img src="boing.png" alt="Boing">
      </div>
      <div id="score-boing" class="score">0</div>
    </div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <select id="selectTeam">
      <option value="nickelodeon">Nickelodeon</option>
      <option value="disney">Disney</option>
      <option value="boing">Boing</option>
    </select>

    <select id="selectDay">
      <option value="Lunes">Lunes</option>
      <option value="Martes">Martes</option>
      <option value="Miercoles">Miércoles</option>
      <option value="Jueves">Jueves</option>
      <option value="Viernes">Viernes</option>
      <option value="Sabado">Sábado</option>
      <option value="Otros">OTROS</option>
    </select>

    <select id="selectActivity">
      <option value="0">Actividad Principal</option>
      <option value="1">Participación</option>
      <option value="2">Pelotita</option>
    </select>

    <button class="btn-minus" onclick="changePoints(-1)">-1</button>
    <button class="btn-plus" onclick="changePoints(1)">+1</button>
  </div>

  <div class="scores-table-wrapper">
  <table>
    <colgroup>
      <col class="equipo-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col"><col class="day-col">
      <col class="day-col"><col class="day-col">
      <col class="total-col">
    </colgroup>
    <thead>
      <tr>
        <th rowspan="2">EQUIPO</th>
        <th colspan="3">LUNES</th>
        <th colspan="3">MARTES</th>
        <th colspan="3">MIÉRCOLES</th>
        <th colspan="3">JUEVES</th>
        <th colspan="3">VIERNES</th>
        <th colspan="3">SÁBADO</th>
        <th colspan="2">OTROS</th>
        <th rowspan="2">TOTAL</th>
      </tr>
      <tr>
        <th>Petanca</th><th>Part.</th><th>Pel.</th>
        <th>Quiz</th><th>Part.</th><th>Pel.</th>
        <th>Cluedo</th><th>Part.</th><th>Pel.</th>
        <th>Bolos</th><th>Part.</th><th>Pel.</th>
        <th>R&M</th><th>Part.</th><th>Pel.</th>
        <th>Padel</th><th>Part.</th><th>Pel.</th>
        <th>Asesino</th><th>Casino</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      </tbody>
  </table>
  </div>

  <script>
    const BIN_ID = '69a696fe43b1c97be9ae6a03'; // Tu BIN ID
    const API_KEY = '$2a$10$3pf9.VUX13lsbWM/LvBJl.TEttgbKr2Jyz35CM45O6iRXvfToOWg6'; // Tu MASTER KEY
    const SECRET = 'laminar2026';
    
    const days = ["Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado", "Otros"];
    const teams = ["nickelodeon", "disney", "boing"];

    function getDefaultDb() {
      const db = {};
      teams.forEach(t => {
        db[t] = {};
        days.forEach(d => {
          if (d === 'Otros') {
            db[t][d] = [0, 0]; // [Asesino, Casino]
          } else {
            db[t][d] = [0, 0, 0]; // [Game, Part., Pel.]
          }
        });
      });
      return db;
    }

    let db = getDefaultDb();

    // Mostrar panel si es admin
    if (new URLSearchParams(window.location.search).get('admin') === SECRET) {
      document.getElementById('adminPanel').style.display = 'flex';
    }

    const selectDay = document.getElementById('selectDay');
    const selectActivity = document.getElementById('selectActivity');
    const dayOptions = [
      { value: '0', text: 'Actividad Principal' },
      { value: '1', text: 'Participación' },
      { value: '2', text: 'Pelotita' }
    ];
    const otrosOptions = [
      { value: '0', text: 'Asesino' },
      { value: '1', text: 'Casino' }
    ];
    function updateActivityOptions() {
      const isOtros = selectDay.value === 'Otros';
      const opts = isOtros ? otrosOptions : dayOptions;
      selectActivity.innerHTML = opts.map(o => `<option value="${o.value}">${o.text}</option>`).join('');
    }
    selectDay.addEventListener('change', updateActivityOptions);

    async function fetchData() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        if (!res.ok) throw new Error('JSONBin respondió con error: ' + res.status);
        const json = await res.json();
        if (json.record && json.record.teams) {
          db = json.record.teams;
          teams.forEach(t => {
            if (!db[t]) db[t] = {};
            if (!db[t].Otros || !Array.isArray(db[t].Otros)) {
              db[t].Otros = [0, 0];
            } else if (db[t].Otros.length > 2) {
              db[t].Otros = [db[t].Otros[0] || 0, db[t].Otros[1] || 0];
            }
          });
        }
        renderTable();
      } catch (e) {
        console.error("Error cargando datos (¿estás usando file://? Usa un servidor local):", e);
        renderTable();
      }
    }

    function renderTable() {
      let html = "";

      teams.forEach(t => {
        let total = 0;
        const teamLabel = t === 'nickelodeon' ? 'Nick' : t;
        html += `<tr class="row-${t}"><td class="team-header">${teamLabel}</td>`;

        days.forEach(d => {
          const raw = (db[t] && db[t][d]) ? db[t][d] : (d === 'Otros' ? [0, 0] : [0, 0, 0]);
          const scores = d === 'Otros' ? [raw[0] || 0, raw[1] || 0] : [raw[0] || 0, raw[1] || 0, raw[2] || 0];
          const sumDay = scores.reduce((a, b) => a + b, 0);
          total += sumDay;
          if (d === 'Otros') {
            html += `<td>${scores[0]}</td><td>${scores[1]}</td>`;
          } else {
            html += `<td>${scores[0]}</td><td>${scores[1]}</td><td>${scores[2]}</td>`;
          }
        });

        html += `<td class="total-cell">${total}</td></tr>`;

        // Actualizar total en la tarjeta del scoreboard
        const cardEl = document.getElementById('score-' + t);
        if (cardEl) cardEl.textContent = total;
      });

      document.getElementById('tableBody').innerHTML = html;
    }

    async function changePoints(val) {
      const team = document.getElementById('selectTeam').value;
      const day = document.getElementById('selectDay').value;
      const activityIdx = parseInt(document.getElementById('selectActivity').value, 10);

      if (!db[team][day]) {
        db[team][day] = day === 'Otros' ? [0, 0] : [0, 0, 0];
      }
      const arr = db[team][day];
      if (day === 'Otros') {
        if (activityIdx < 0 || activityIdx > 1) return;
        arr[activityIdx] = (arr[activityIdx] || 0) + val;
        if (arr[activityIdx] < 0) arr[activityIdx] = 0;
      } else {
        if (activityIdx < 0 || activityIdx > 2) return;
        arr[activityIdx] = (arr[activityIdx] || 0) + val;
        if (arr[activityIdx] < 0) arr[activityIdx] = 0;
      }
      renderTable();

      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY,
            'X-Bin-Versioning': 'false'
          },
          body: JSON.stringify({ teams: db })
        });
        if (!res.ok) {
          if (res.status === 401) throw new Error('401: Clave API incorrecta o sin permiso de escritura. Usa la Master Key de https://jsonbin.io/app/api-keys');
          throw new Error('Error al guardar: ' + res.status);
        }
      } catch (e) {
        console.error("No se pudo guardar en JSONBin:", e.message || e);
      }
    }

    renderTable(); // Mostrar filas de equipos de inmediato (con ceros o datos guardados)
    fetchData();
    setInterval(fetchData, 15000); // Refrescar cada 15s
  </script>
</body>
</html>
