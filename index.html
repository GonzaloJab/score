<!DOCTYPE html>
<html>
<head>
  <title>Puntuaciones Semana Grande</title>
  <style>
    :root {
      --nick-color: #ff7000; /* Naranja oficial Nickelodeon */
      --disney-color: #0066cc;
      --boing-color: #e60000;
    }

    body { 
      background: #80ced6; 
      background-image: radial-gradient(#ffffff 15%, transparent 16%), radial-gradient(#ffffff 15%, transparent 16%);
      background-size: 60px 60px;
      background-position: 0 0, 30px 30px;
      font-family: 'Arial Rounded MT Bold', sans-serif; 
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding-bottom: 50px;
    }

    h1 { 
      font-size: 4rem; 
      color: #fff; 
      text-shadow: 6px 6px 0px #333; 
      margin: 40px 0;
      text-transform: uppercase;
      transform: skewY(-2deg);
    }

    .scoreboard { 
      display: flex; 
      justify-content: center; 
      flex-wrap: wrap;
      gap: 30px; 
    }

    .team-card { 
      width: 240px; 
      padding: 25px 10px; 
      border-radius: 40px; 
      color: white; 
      border: 6px solid #333; 
      box-shadow: 12px 12px 0px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo-container {
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      margin: 0 10px 15px 10px;
      padding: 10px;
    }

    .logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.2));
    }

    .nickelodeon { background: var(--nick-color); transform: rotate(-1.5deg); }
    .disney { background: var(--disney-color); transform: rotate(1deg); }
    .boing { background: var(--boing-color); transform: rotate(-1deg); }

    .score { 
      font-size: 6rem; 
      font-weight: 900; 
      text-shadow: 6px 6px 0px rgba(0,0,0,0.3);
      margin: 10px 0;
    }

    .controls { 
      margin-top: 15px; 
      display: none; 
      padding: 10px;
    }

    .btn-group { display: flex; justify-content: center; gap: 15px; }

    button { 
      cursor: pointer; 
      padding: 15px 20px; 
      border-radius: 15px; 
      border: 3px solid #333; 
      font-weight: bold; 
      font-size: 1.5rem;
      background: white;
      box-shadow: 4px 4px 0px #333;
    }

    button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #333; }
    .btn-plus { color: #2ecc71; }
    .btn-minus { color: #e74c3c; }
    
    .reset-container { margin-top: 50px; display: none; }
    .btn-reset { background: #333; color: white; font-size: 1rem; padding: 10px 20px; }

  </style>
</head>
<body>

  <h1>Semana Grande CMP</h1>
  
  <div class="scoreboard">
    <div class="team-card nickelodeon">
      <div class="logo-container">
        <img src="nickelodeon.png" alt="Nickelodeon">
      </div>
      <div id="nickelodeon" class="score">0</div>
      <div class="controls">
        <div class="btn-group">
          <button class="btn-minus" onclick="updateScore('nickelodeon', -1)">−</button>
          <button class="btn-plus" onclick="updateScore('nickelodeon', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="team-card disney">
      <div class="logo-container">
        <img src="disney.png" alt="Disney">
      </div>
      <div id="disney" class="score">0</div>
      <div class="controls">
        <div class="btn-group">
          <button class="btn-minus" onclick="updateScore('disney', -1)">−</button>
          <button class="btn-plus" onclick="updateScore('disney', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="team-card boing">
      <div class="logo-container">
        <img src="boing.png" alt="Boing">
      </div>
      <div id="boing" class="score">0</div>
      <div class="controls">
        <div class="btn-group">
          <button class="btn-minus" onclick="updateScore('boing', -1)">−</button>
          <button class="btn-plus" onclick="updateScore('boing', 1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="reset-container controls">
    <button class="btn-reset" onclick="resetScores()">RESETEAR TODO A 0</button>
  </div>

  <script>
    // REEMPLAZA ESTO CON TUS DATOS DE JSONBIN
    const BIN_ID = 'TU_BIN_ID_AQUI';
    const API_KEY = 'TU_API_KEY_AQUI';
    const SECRET_PASS = 'laminar2026';

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === SECRET_PASS) {
      document.querySelectorAll('.controls').forEach(el => el.style.display = 'block');
    }

    async function loadScores() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        document.getElementById('nickelodeon').innerText = data.record.nickelodeon;
        document.getElementById('disney').innerText = data.record.disney;
        document.getElementById('boing').innerText = data.record.boing;
      } catch (e) { console.log("Error cargando datos"); }
    }

    async function updateScore(team, points) {
      const scores = {
        nickelodeon: parseInt(document.getElementById('nickelodeon').innerText),
        disney: parseInt(document.getElementById('disney').innerText),
        boing: parseInt(document.getElementById('boing').innerText)
      };

      scores[team] += points;
      document.getElementById(team).innerText = scores[team];

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify(scores)
      });
    }

    async function resetScores() {
      if(confirm("¿Seguro que quieres resetear los puntos?")) {
        const resetData = { nickelodeon: 0, disney: 0, boing: 0 };
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body: JSON.stringify(resetData)
        });
        loadScores();
      }
    }

    setInterval(loadScores, 5000);
    loadScores();
  </script>
</body>
</html>
